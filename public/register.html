<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register - Simple Site</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <div class="logo">SimpleSite</div>
      <nav class="nav">
        <a href="/">Home</a>
        <a href="/about">About Us</a>
        <a href="/product">Product</a>
        <a href="/contact">Contact Us</a>
        <a href="/register" class="btn active">Register</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <section class="page-section">
      <h1>Register</h1>
      <form class="form" method="POST" action="/register">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" required />
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" required />
        </div>
        <div class="form-group">
          <label for="confirm-password">Confirm Password</label>
          <input type="password" id="confirm-password" name="confirm-password" required />
        </div>
        <div class="form-group">
          <label for="age">Age</label>
          <input type="number" id="age" name="age" min="0" required />
        </div>
        <button type="submit" class="btn primary">Înregistrează-te</button>
      </form>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      &copy; <span id="year"></span> SimpleSite. Toate drepturile rezervate.
    </div>
  </footer>

  <script>
    const form = document.querySelector('.form');
    const passwordInput = document.getElementById('password');
    const confirmPasswordInput = document.getElementById('confirm-password');

    function validatePasswords() {
      if (passwordInput.value && confirmPasswordInput.value && passwordInput.value !== confirmPasswordInput.value) {
        confirmPasswordInput.setCustomValidity("Parolele nu se potrivesc.");
      } else {
        confirmPasswordInput.setCustomValidity("");
      }
    }

    passwordInput.addEventListener('input', validatePasswords);
    confirmPasswordInput.addEventListener('input', validatePasswords);

    form.addEventListener('submit', function(event) {
      if (!form.checkValidity()) {
        event.preventDefault();
        form.reportValidity();
      }
    });

    document.getElementById('year').textContent = new Date().getFullYear();
  </script>
</body>
</html>
